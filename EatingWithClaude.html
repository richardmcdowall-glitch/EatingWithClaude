async function askClaude(prompt,maxTokens=800){const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,messages:[{role:"user",content:prompt}]})});const d=await r.json();return(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim()}
async function askClaudeImg(prompt,b64,mt,maxTokens=800){const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mt,data:b64}},{type:"text",text:prompt}]}]})});const d=await r.json();return(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim()}

function App(){
  const[tab,setTab]=useState("build");
  const[ingredients,setIngredients]=useState([]);
  const[savedMeals,setSavedMeals]=useState([]);
  const[plate,setPlate]=useState([]);
  const[mealName,setMealName]=useState("");
  const[mealTime,setMealTime]=useState(nowTime());
  const[toast,setToast]=useState(null);

  useEffect(()=>{
    const si=load(KEYS.ingredients);
    if(si&&si.length)setIngredients(si);else{setIngredients(SEED_INGREDIENTS);save(KEYS.ingredients,SEED_INGREDIENTS)}
    const sm=load(KEYS.meals);
    if(sm&&sm.length)setSavedMeals(sm);else{setSavedMeals(SEED_MEALS);save(KEYS.meals,SEED_MEALS)}
  },[]);

  const saveIngs=l=>{setIngredients(l);save(KEYS.ingredients,l)};
  const saveMls=l=>{setSavedMeals(l);save(KEYS.meals,l)};
  const flash=(msg,dur=2000)=>{setToast(msg);setTimeout(()=>setToast(null),dur)};

  const totals=useMemo(()=>plate.reduce((a,i)=>({cal:a.cal+Math.round(i.cal*i.qty),p:a.p+Math.round(i.p*i.qty),c:a.c+Math.round(i.c*i.qty),f:a.f+Math.round(i.f*i.qty)}),{cal:0,p:0,c:0,f:0}),[plate]);

  const addToPlate=ing=>{const ex=plate.find(p=>p.id===ing.id);if(ex)setPlate(plate.map(p=>p.id===ing.id?{...p,qty:p.qty+1}:p));else setPlate([...plate,{...ing,qty:1}])};
  const updateQty=(id,qty)=>{if(qty<=0)setPlate(plate.filter(p=>p.id!==id));else setPlate(plate.map(p=>p.id===id?{...p,qty}:p))};
  const rmItem=id=>setPlate(plate.filter(p=>p.id!==id));

  const mealLine=()=>{const n=mealName||"Meal";const d=plate.map(p=>`${p.qty>1?p.qty+"× ":""}${p.name}`).join(", ");return`MEAL|${todayStr()}|${mealTime}|${n}|${totals.cal}|${totals.p}|${totals.c}|${totals.f}|${d}`};
  const clip=text=>{navigator.clipboard.writeText(text).then(()=>flash("📋 Copied!")).catch(()=>flash("❌ Copy failed"))};

  const saveNew=()=>{if(!plate.length)return;const m={id:`m_${Date.now()}`,name:mealName||"New meal",time:mealTime,items:plate.map(i=>({...i})),...totals,created:todayStr()};saveMls([m,...savedMeals]);flash("⭐ Saved")};
  const loadMeal=m=>{setPlate(m.items.map(i=>({...i})));setMealName(m.name);setMealTime(m.time||nowTime());setTab("build");flash("📥 Loaded")};
  const clearPlate=()=>{setPlate([]);setMealName("");setMealTime(nowTime())};

  const addAI=parsed=>{const item={id:`ai_${Date.now()}`,name:parsed.name,portion:"AI estimate",cal:parsed.cal,p:parsed.p,c:parsed.c,f:parsed.f,cat:"other",qty:1};setPlate(prev=>[...prev,item]);setMealName(prev=>prev||parsed.name);setTab("build");flash("🤖 Added")};
  const addIngAI=ing=>{const n={...ing,id:`u_${Date.now()}`};saveIngs([n,...ingredients]);flash("✅ Added to library")};

  const sendCF=()=>{if(!plate.length)return;try{const h=JSON.parse(localStorage.getItem("rh-health-v3")||"[]");const date=todayStr();const meal={date,time:mealTime,name:mealName||"Meal",calories:totals.cal,protein_g:totals.p,carbs_g:totals.c,fat_g:totals.f,description:plate.map(p=>`${p.qty>1?p.qty+"× ":""}${p.name}`).join(", ")};let e=h.find(x=>x.date===date);if(!e){e={date,weight:"",mood:"3",readiness:"3"};h.push(e)}if(!e.meals)e.meals=[];e.meals.push(meal);const all=e.meals;const t=all.reduce((a,m)=>({cal:a.cal+(m.calories||0),p:a.p+(m.protein_g||0),c:a.c+(m.carbs_g||0),f:a.f+(m.fat_g||0)}),{cal:0,p:0,c:0,f:0});e.calories=String(Math.round(t.cal));e.protein=String(Math.round(t.p));e.carbs=String(Math.round(t.c));e.fat=String(Math.round(t.f));h.sort((a,b)=>a.date.localeCompare(b.date));localStorage.setItem("rh-health-v3",JSON.stringify(h));flash("✅ → ClaudeFit!")}catch{flash("❌ Failed")}};

  const tabs=[{key:"build",icon:"🍽️"},{key:"meals",icon:"⭐"},{key:"library",icon:"📚"},{key:"ai",icon:"🤖"}];

  return(
    <div style={{maxWidth:420,margin:"0 auto",padding:"0 0 20px",minHeight:"100vh"}}>
      {/* Top icon nav */}
      <div style={{display:"flex",justifyContent:"center",gap:6,padding:"12px 16px 6px"}}>
        {tabs.map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)} style={{width:42,height:42,borderRadius:"50%",border:"none",cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",background:tab===t.key?C.spotlight:"transparent",transition:"all 0.15s"}}>
            <span style={{filter:tab===t.key?"brightness(2)":"none"}}>{t.icon}</span>
          </button>
        ))}
        <a href="https://richardmcdowall-glitch.github.io/ClaudeFit/" target="_blank" rel="noopener"
          style={{width:42,height:42,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,textDecoration:"none",opacity:0.5}}>🏋️</a>
      </div>

      {/* Macro bar */}
      {plate.length>0&&(
        <div style={{...sty.card,margin:"0 12px 8px",padding:10,display:"flex",justifyContent:"space-around",background:`linear-gradient(135deg,${C.card},${C.cardAlt})`,animation:"slideUp 0.2s ease"}}>
          <MC label="kcal" value={totals.cal} color={totals.cal>2000?C.red:totals.cal>1800?C.amber:C.green}/>
          <MC label="P" value={totals.p} color={C.blue} unit="g"/><MC label="C" value={totals.c} color={C.amber} unit="g"/><MC label="F" value={totals.f} color={C.pink} unit="g"/>
        </div>
      )}

      <div style={{padding:"0 12px"}}>
        {tab==="build"&&<BuildTab ings={ingredients} plate={plate} add={addToPlate} upd={updateQty} rm={rmItem} totals={totals} mn={mealName} setMn={setMealName} mt={mealTime} setMt={setMealTime} ml={mealLine} clip={clip} saveNew={saveNew} clear={clearPlate} sendCF={sendCF}/>}
        {tab==="meals"&&<MealsTab meals={savedMeals} saveMls={saveMls} loadMeal={loadMeal} clip={clip} flash={flash}/>}
        {tab==="library"&&<LibTab ings={ingredients} saveIngs={saveIngs} flash={flash}/>}
        {tab==="ai"&&<AITab addAI={addAI} addIngAI={addIngAI} flash={flash}/>}
      </div>

      {toast&&(<div style={{position:"fixed",top:60,left:"50%",transform:"translateX(-50%)",background:C.card,color:C.text,padding:"10px 20px",borderRadius:10,fontSize:13,fontWeight:600,zIndex:999,border:`1px solid ${C.accent}`,boxShadow:"0 4px 20px rgba(0,0,0,0.15)",animation:"fadeIn 0.2s ease"}}>{toast}</div>)}

      <div style={{textAlign:"center",padding:"30px 0 10px",fontSize:9,color:C.textDim,letterSpacing:0.5}}>
        EatingWithClaude v{VER} · <a href="mailto:rikimusprime@outlook.com" style={{color:C.textDim}}>rikimusprime@outlook.com</a>
      </div>
    </div>
  );
}

function MC({label,value,color,unit=""}){return(<div style={{textAlign:"center"}}><div style={{fontSize:16,fontWeight:700,color,fontFamily:MONO}}>{value}{unit}</div><div style={{fontSize:9,color:C.textDim,fontWeight:600,letterSpacing:0.5,textTransform:"uppercase"}}>{label}</div></div>)}

// ─── BUILD TAB ─────────────────────────────────────────────────────────────
function BuildTab({ings,plate,add,upd,rm,totals,mn,setMn,mt,setMt,ml,clip,saveNew,clear,sendCF}){
  const[search,setSearch]=useState("");
  const[catF,setCatF]=useState("all");
  const filtered=useMemo(()=>{let l=ings;if(catF!=="all")l=l.filter(i=>i.cat===catF);if(search.trim()){const q=search.toLowerCase();l=l.filter(i=>i.name.toLowerCase().includes(q))}return l},[ings,catF,search]);

  return(<div>
    <div style={{display:"flex",gap:8,marginBottom:10}}>
      <input value={mn} onChange={e=>setMn(e.target.value)} placeholder="Meal name..." style={{...sty.input(),flex:1}}/>
      <input type="time" value={mt} onChange={e=>setMt(e.target.value)} style={{...sty.input("90px"),textAlign:"center",fontFamily:MONO}}/>
    </div>

    {plate.length>0&&(
      <div style={{...sty.card,padding:10}}>
        <div style={{...sty.label,marginBottom:6}}>🍽️ On the plate</div>
        {plate.map(item=>{
          const ic=Math.round(item.cal*item.qty),ip=Math.round(item.p*item.qty),icc=Math.round(item.c*item.qty),iff=Math.round(item.f*item.qty);
          const hc=Math.round(item.cal*0.5),hp=Math.round(item.p*0.5),hcc=Math.round(item.c*0.5),hf=Math.round(item.f*0.5);
          return(<div key={item.id} style={{padding:"6px 0",borderBottom:`1px solid ${C.border}22`}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <button onClick={()=>upd(item.id,item.qty-0.5)} style={sty.qtyBtn}>−</button>
              <span style={{fontFamily:MONO,fontSize:13,fontWeight:700,color:C.accent,minWidth:20,textAlign:"center"}}>{item.qty}</span>
              <button onClick={()=>upd(item.id,item.qty+0.5)} style={sty.qtyBtn}>+</button>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</div>
                <div style={{fontSize:10,color:C.textDim}}>{item.portion}</div>
              </div>
              <button onClick={()=>rm(item.id)} style={{background:"none",border:"none",color:C.red,fontSize:14,cursor:"pointer",padding:4}}>✕</button>
            </div>
            <div style={{display:"flex",gap:8,marginLeft:84,marginTop:3,fontSize:9,fontFamily:MONO}}>
              <span style={{color:C.green}}>{ic}kcal</span><span style={{color:C.blue}}>P{ip}</span><span style={{color:C.amber}}>C{icc}</span><span style={{color:C.pink}}>F{iff}</span>
              <span style={{color:C.textDim,marginLeft:4}}>±{hc}/{hp}/{hcc}/{hf}</span>
            </div>
          </div>)})}
        <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
          <button onClick={()=>clip(ml())} style={sty.btn(C.accent,true)}>📋 Copy</button>
          <button onClick={sendCF} style={sty.btn(C.teal,true)}>🏋️→CF</button>
          <button onClick={saveNew} style={sty.btn(C.surface,true)}>⭐ Save</button>
          <button onClick={clear} style={{...sty.btn(C.surface,true),color:C.red,marginLeft:"auto"}}>Clear</button>
        </div>
      </div>
    )}

    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search ingredients..." style={{...sty.input(),marginBottom:8}}/>
    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>
      {CATS.map(cat=>(<span key={cat.key} onClick={()=>setCatF(cat.key)} style={sty.chip(catF===cat.key,C.accent)}>{cat.icon} {cat.label}</span>))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
      {filtered.map(ing=>(<button key={ing.id} onClick={()=>add(ing)} style={{...sty.card,padding:10,cursor:"pointer",textAlign:"left",border:`1px solid ${C.border}`,transition:"all 0.1s",marginBottom:0}}>
        <div style={{fontSize:12,fontWeight:600,color:C.text,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ing.name}</div>
        <div style={{fontSize:10,color:C.textDim,marginBottom:4}}>{ing.portion}</div>
        <div style={{display:"flex",gap:6,fontSize:10,fontFamily:MONO}}><span style={{color:C.green}}>{ing.cal}</span><span style={{color:C.blue}}>P{ing.p}</span><span style={{color:C.amber}}>C{ing.c}</span><span style={{color:C.pink}}>F{ing.f}</span></div>
      </button>))}
    </div>
    {filtered.length===0&&<div style={{textAlign:"center",padding:20,color:C.textDim,fontSize:13}}>No matches</div>}
  </div>);
}

// ─── MEALS TAB ─────────────────────────────────────────────────────────────
function MealsTab({meals,saveMls,loadMeal,clip,flash}){
  const[search,setSearch]=useState("");
  const[editing,setEditing]=useState(null);
  const[editName,setEditName]=useState("");
  const[delId,setDelId]=useState(null);

  const filtered=search.trim()?meals.filter(m=>m.name.toLowerCase().includes(search.toLowerCase())):meals;

  const rename=id=>{if(!editName.trim())return;saveMls(meals.map(m=>m.id===id?{...m,name:editName}:m));setEditing(null);flash("✅ Renamed")};
  const del=id=>{saveMls(meals.filter(m=>m.id!==id));setDelId(null);flash("🗑️ Deleted")};
  const dup=meal=>{const d={...meal,id:`m_${Date.now()}`,name:`${meal.name} (copy)`,items:meal.items.map(i=>({...i}))};saveMls([d,...meals]);flash("📄 Duplicated")};
  const mealLine=m=>{const desc=m.items?.map(i=>`${i.qty!==1?i.qty+"× ":""}${i.name}`).join(", ")||"";return`MEAL|${todayStr()}|${m.time||""}|${m.name}|${m.cal}|${m.p}|${m.c}|${m.f}|${desc}`};

  return(<div>
    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search meals..." style={{...sty.input(),marginBottom:10}}/>
    <div style={{fontSize:11,color:C.textDim,marginBottom:8}}>{filtered.length} meals</div>

    {filtered.map(m=>(<div key={m.id} style={{...sty.card,padding:10,marginBottom:6,animation:"fadeIn 0.15s ease"}}>
      {editing===m.id?(
        <div style={{display:"flex",gap:6,marginBottom:6}}>
          <input value={editName} onChange={e=>setEditName(e.target.value)} style={{...sty.input(),flex:1}} autoFocus onKeyDown={e=>e.key==="Enter"&&rename(m.id)}/>
          <button onClick={()=>rename(m.id)} style={sty.btn(C.accent,true)}>✓</button>
          <button onClick={()=>setEditing(null)} style={sty.btn(C.surface,true)}>✕</button>
        </div>
      ):(
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <div style={{fontSize:13,fontWeight:600,color:C.text}}>{m.name}</div>
          <span style={{fontSize:10,color:C.textDim}}>{m.time}</span>
        </div>
      )}
      <div style={{display:"flex",gap:8,fontSize:10,fontFamily:MONO,marginBottom:4}}>
        <span style={{color:C.green}}>{m.cal}kcal</span><span style={{color:C.blue}}>P{m.p}g</span><span style={{color:C.amber}}>C{m.c}g</span><span style={{color:C.pink}}>F{m.f}g</span>
      </div>
      <div style={{fontSize:10,color:C.textDim,marginBottom:6}}>{m.items?.map(i=>`${i.qty!==1?i.qty+"× ":""}${i.name}`).join(", ")}</div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
        <button onClick={()=>loadMeal(m)} style={sty.btn(C.accent,true)}>📥 Load</button>
        <button onClick={()=>clip(mealLine(m))} style={sty.btn(C.surface,true)}>📋</button>
        <button onClick={()=>{setEditing(m.id);setEditName(m.name)}} style={sty.btn(C.surface,true)}>✏️</button>
        <button onClick={()=>dup(m)} style={sty.btn(C.surface,true)}>📄</button>
        {delId===m.id?(<button onClick={()=>del(m.id)} style={{...sty.btn(C.red,true),marginLeft:"auto"}}>Confirm</button>)
        :(<button onClick={()=>setDelId(m.id)} style={{...sty.btn(C.surface,true),color:C.red,marginLeft:"auto"}}>🗑️</button>)}
      </div>
    </div>))}
    {filtered.length===0&&<div style={{textAlign:"center",padding:30,color:C.textDim,fontSize:13}}>No meals yet. Build one on 🍽️ and tap ⭐ Save.</div>}
  </div>);
}

// ─── LIBRARY TAB ───────────────────────────────────────────────────────────
function LibTab({ings,saveIngs,flash}){
  const[search,setSearch]=useState("");
  const[editing,setEditing]=useState(null);
  const[adding,setAdding]=useState(false);
  const[form,setForm]=useState({name:"",portion:"",cal:"",p:"",c:"",f:"",cat:"other"});

  const filtered=search.trim()?ings.filter(i=>i.name.toLowerCase().includes(search.toLowerCase())):ings;
  const startEdit=ing=>{setEditing(ing.id);setForm({name:ing.name,portion:ing.portion,cal:String(ing.cal),p:String(ing.p),c:String(ing.c),f:String(ing.f),cat:ing.cat})};
  const saveEdit=id=>{if(!form.name.trim())return;saveIngs(ings.map(i=>i.id===id?{...i,name:form.name,portion:form.portion,cal:+form.cal||0,p:+form.p||0,c:+form.c||0,f:+form.f||0,cat:form.cat}:i));setEditing(null);flash("✅ Updated")};
  const deleteIng=id=>{saveIngs(ings.filter(i=>i.id!==id));flash("🗑️ Deleted")};
  const addNew=()=>{if(!form.name.trim())return;saveIngs([{id:`u_${Date.now()}`,name:form.name,portion:form.portion,cal:+form.cal||0,p:+form.p||0,c:+form.c||0,f:+form.f||0,cat:form.cat},...ings]);setAdding(false);setForm({name:"",portion:"",cal:"",p:"",c:"",f:"",cat:"other"});flash("✅ Added")};

  const F=({onSave,btnLabel})=>(<div style={{...sty.card,animation:"fadeIn 0.2s ease"}}>
    <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Name" style={{...sty.input(),marginBottom:6}}/>
    <input value={form.portion} onChange={e=>setForm({...form,portion:e.target.value})} placeholder="Portion (e.g. 100g)" style={{...sty.input(),marginBottom:6}}/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:4,marginBottom:6}}>
      <input type="number" value={form.cal} onChange={e=>setForm({...form,cal:e.target.value})} placeholder="kcal" style={{...sty.input(),fontSize:12,padding:"6px 4px",textAlign:"center"}}/>
      <input type="number" value={form.p} onChange={e=>setForm({...form,p:e.target.value})} placeholder="P" style={{...sty.input(),fontSize:12,padding:"6px 4px",textAlign:"center"}}/>
      <input type="number" value={form.c} onChange={e=>setForm({...form,c:e.target.value})} placeholder="C" style={{...sty.input(),fontSize:12,padding:"6px 4px",textAlign:"center"}}/>
      <input type="number" value={form.f} onChange={e=>setForm({...form,f:e.target.value})} placeholder="F" style={{...sty.input(),fontSize:12,padding:"6px 4px",textAlign:"center"}}/>
    </div>
    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
      {CATS.filter(c=>c.key!=="all").map(cat=>(<span key={cat.key} onClick={()=>setForm({...form,cat:cat.key})} style={sty.chip(form.cat===cat.key,C.accent)}>{cat.icon} {cat.label}</span>))}
    </div>
    <div style={{display:"flex",gap:6}}>
      <button onClick={onSave} style={sty.btn(C.accent,true)}>{btnLabel}</button>
      <button onClick={()=>{setEditing(null);setAdding(false)}} style={sty.btn(C.surface,true)}>Cancel</button>
    </div>
  </div>);

  return(<div>
    <div style={{display:"flex",gap:8,marginBottom:10}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search library..." style={{...sty.input(),flex:1}}/>
      <button onClick={()=>{setAdding(true);setForm({name:"",portion:"",cal:"",p:"",c:"",f:"",cat:"other"})}} style={sty.btn(C.accent,true)}>+ Add</button>
    </div>
    {adding&&<F onSave={addNew} btnLabel="Add"/>}
    <div style={{fontSize:11,color:C.textDim,marginBottom:8}}>{filtered.length} ingredients</div>
    {filtered.map(ing=>(<div key={ing.id}>
      {editing===ing.id?(<F onSave={()=>saveEdit(ing.id)} btnLabel="Save"/>):(
        <div style={{...sty.card,padding:10,display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,color:C.text}}>{ing.name}</div>
            <div style={{fontSize:10,color:C.textDim}}>{ing.portion}</div>
            <div style={{display:"flex",gap:8,fontSize:10,fontFamily:MONO,marginTop:2}}><span style={{color:C.green}}>{ing.cal}kcal</span><span style={{color:C.blue}}>P{ing.p}</span><span style={{color:C.amber}}>C{ing.c}</span><span style={{color:C.pink}}>F{ing.f}</span></div>
          </div>
          <button onClick={()=>startEdit(ing)} style={{background:"none",border:"none",color:C.textMid,fontSize:14,cursor:"pointer"}}>✏️</button>
          <button onClick={()=>deleteIng(ing.id)} style={{background:"none",border:"none",color:C.red,fontSize:14,cursor:"pointer"}}>🗑️</button>
        </div>
      )}
    </div>))}
  </div>);
}

// ─── AI TAB ────────────────────────────────────────────────────────────────
function AITab({addAI,addIngAI,flash}){
  const[mode,setMode]=useState("text");
  const[text,setText]=useState("");
  const[loading,setLoading]=useState(false);
  const[results,setResults]=useState(null);
  const[error,setError]=useState(null);
  const photoRef=useRef(null);
  const PROMPT=`You are a nutrition estimation tool. Respond ONLY with JSON, no markdown, no backticks, no explanation. Return an array of objects, each with: name (string), portion (string), cal (number), p (number protein grams), c (number carbs grams), f (number fat grams). Be accurate for Norwegian portion sizes. Round to whole numbers.`;

  const lookupText=async()=>{if(!text.trim()||loading)return;setLoading(true);setError(null);setResults(null);try{const raw=await askClaude(`${PROMPT}\n\nEstimate macros for:\n${text}`);const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());setResults(Array.isArray(parsed)?parsed:[parsed])}catch{setError("Couldn't parse. Try simpler text.")}setLoading(false)};
  const lookupPhoto=async file=>{if(!file||loading)return;setLoading(true);setError(null);setResults(null);try{const b64=await new Promise((r,j)=>{const rd=new FileReader();rd.onload=()=>r(rd.result.split(",")[1]);rd.onerror=()=>j();rd.readAsDataURL(file)});const raw=await askClaudeImg(`${PROMPT}\n\nLook at this meal photo. Identify all foods, estimate portions and macros.`,b64,file.type||"image/jpeg");const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());setResults(Array.isArray(parsed)?parsed:[parsed])}catch{setError("Couldn't analyse photo.")}setLoading(false)};

  return(<div>
    <div style={{display:"flex",gap:6,marginBottom:12}}>
      <button onClick={()=>setMode("text")} style={{...sty.btn(mode==="text"?C.accent:C.surface),flex:1}}>📝 Text</button>
      <button onClick={()=>setMode("photo")} style={{...sty.btn(mode==="photo"?C.accent:C.surface),flex:1}}>📸 Photo</button>
    </div>
    {mode==="text"?(<div>
      <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={"Describe food...\ne.g. '2 eggs, 50g oats with milk'"} rows={3} style={{...sty.input(),resize:"vertical",fontFamily:SANS,lineHeight:1.5}}/>
      <button onClick={lookupText} disabled={loading||!text.trim()} style={{...sty.btn(C.accent),width:"100%",marginTop:8,opacity:loading||!text.trim()?0.5:1}}>{loading?"🔄 Looking up...":"🔍 Estimate macros"}</button>
    </div>):(<div>
      <input ref={photoRef} type="file" accept="image/*" capture="environment" onChange={e=>e.target.files[0]&&lookupPhoto(e.target.files[0])} style={{display:"none"}}/>
      <button onClick={()=>photoRef.current?.click()} disabled={loading} style={{...sty.btn(C.accent),width:"100%",padding:"20px",fontSize:15,opacity:loading?0.5:1}}>{loading?"🔄 Analysing...":"📸 Take photo or choose image"}</button>
    </div>)}
    {error&&<div style={{...sty.card,marginTop:10,borderColor:C.red,color:C.red,fontSize:12}}>⚠️ {error}</div>}
    {results&&results.length>0&&(<div style={{marginTop:12}}>
      <div style={sty.label}>Results</div>
      {results.map((item,i)=>(<div key={i} style={{...sty.card,padding:10,animation:"fadeIn 0.2s ease",animationDelay:`${i*0.05}s`,animationFillMode:"both"}}>
        <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:2}}>{item.name}</div>
        <div style={{fontSize:10,color:C.textDim,marginBottom:6}}>{item.portion||""}</div>
        <div style={{display:"flex",gap:10,fontSize:11,fontFamily:MONO,marginBottom:8}}><span style={{color:C.green}}>{item.cal}kcal</span><span style={{color:C.blue}}>P{item.p}g</span><span style={{color:C.amber}}>C{item.c}g</span><span style={{color:C.pink}}>F{item.f}g</span></div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>addAI({name:item.name,cal:item.cal,p:item.p,c:item.c,f:item.f})} style={sty.btn(C.accent,true)}>🍽️ Plate</button>
          <button onClick={()=>addIngAI({name:item.name,portion:item.portion||"1 serving",cal:item.cal,p:item.p,c:item.c,f:item.f,cat:"other"})} style={sty.btn(C.surface,true)}>📚 Library</button>
        </div>
      </div>))}
    </div>)}
  </div>);
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
